# MedStruct AI — GitLab CI/CD (10 Stages)

default:
  image: python:3.11-slim
  tags:
    - medstruct-runner

stages:
  - prepare
  - lint
  - format
  - test-unit
  - test-integration
  - coverage
  - audit-deps
  - audit-secrets
  - offline-check
  - package

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  VENV_PATH: "$CI_PROJECT_DIR/venv"

cache:
  paths:
    - .cache/pip

.python-setup: &python-setup
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq git tesseract-ocr
    - python -m venv $VENV_PATH
    - . $VENV_PATH/bin/activate
    - pip install --upgrade pip
    - pip install -r requirements.txt
    - pip install ruff black pytest pytest-cov pip-audit detect-secrets

# --------------------------------------------------
# 1. Prepare
# --------------------------------------------------
prepare:env:
  stage: prepare
  <<: *python-setup
  script:
    - python --version
    - pip --version
    - echo "Environment prepared successfully."

# --------------------------------------------------
# 2. Lint
# --------------------------------------------------
lint:ruff:
  stage: lint
  <<: *python-setup
  script:
    - ruff check .

# --------------------------------------------------
# 3. Formatting
# --------------------------------------------------
format:black:
  stage: format
  <<: *python-setup
  script:
    - black --check .
  allow_failure: true

# --------------------------------------------------
# 4. Unit Tests
# --------------------------------------------------
test:unit:
  stage: test-unit
  <<: *python-setup
  script:
    - pytest tests/ -v -m "not integration"

# --------------------------------------------------
# 5. Integration Tests
# --------------------------------------------------
test:integration:
  stage: test-integration
  <<: *python-setup
  script:
    - pytest tests/ -v -m "integration"

# --------------------------------------------------
# 6. Coverage
# --------------------------------------------------
coverage:report:
  stage: coverage
  <<: *python-setup
  script:
    - pytest tests/ --cov=utils --cov-report=xml --cov-report=term
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    expire_in: 1 week

# --------------------------------------------------
# 7. Dependency Audit
# --------------------------------------------------
audit:dependencies:
  stage: audit-deps
  <<: *python-setup
  script:
    - pip-audit -r requirements.txt
  allow_failure: true

# --------------------------------------------------
# 8. Secret Scan
# --------------------------------------------------
audit:secrets:
  stage: audit-secrets
  <<: *python-setup
  script:
    - |
      if [ ! -f .secrets.baseline ]; then
        detect-secrets scan > .secrets.baseline
      fi
    - detect-secrets audit .secrets.baseline
  allow_failure: true

# --------------------------------------------------
# 9. Offline Verification
# --------------------------------------------------
offline:verify:
  stage: offline-check
  script:
    - echo "Checking for outbound internet calls..."
    - |
      if grep -REn "requests\.|urllib\.|httpx|aiohttp" utils app.py 2>/dev/null | grep -vqE "localhost|127\.0\.0\.1"; then
        echo "❌ Outbound network calls detected!"
        exit 1
      else
        echo "✅ Offline verification passed."
      fi

# --------------------------------------------------
# 10. Build
# --------------------------------------------------
build:package:
  stage: package
  <<: *python-setup
  script:
    - python -m py_compile app.py
    - find utils -name "*.py" -exec python -m py_compile {} \;
    - echo "Build completed successfully."
  artifacts:
    paths:
      - docs/
      - database/
    expire_in: 1 week
