# MedStruct AI — GitLab CI/CD (10 Stages)
# Runs on a local GitLab Runner (offline-capable)
# Runner tag: medstruct-runner

default:
  tags: [medstruct-runner]
  image: python:3.11-slim

stages:
  - prepare
  - lint
  - format
  - test-unit
  - test-integration
  - coverage
  - audit-deps
  - audit-secrets
  - offline-check
  - package

# ── Cache venv across jobs ─────────────────────────────────────────
variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"
  VENV_PATH: "$CI_PROJECT_DIR/venv"

.python-setup: &python-setup
  before_script:
    - apt-get update -qq && apt-get install -y -qq tesseract-ocr git
    - python -m venv $VENV_PATH
    - source $VENV_PATH/bin/activate
    - pip install --quiet --upgrade pip
    - pip install --quiet -r requirements.txt
  cache:
    key: pip-$CI_COMMIT_REF_SLUG
    paths: [.pip-cache/]

# 1. Prepare
prepare:env:
  stage: prepare
  <<: *python-setup
  script:
    - echo "Environment successfully prepared."

# 2. Lint
lint:ruff:
  stage: lint
  <<: *python-setup
  script:
    - ruff check . --select E,W,F --ignore E501
  allow_failure: false

# 3. Format
format:black:
  stage: format
  <<: *python-setup
  script:
    - black --check .
  allow_failure: true

# 4. Unit Tests
test:unit:
  stage: test-unit
  <<: *python-setup
  script:
    - pytest tests/ -v -m "not integration" --cov=utils --cov-report=xml

# 5. Integration Tests
test:integration:
  stage: test-integration
  <<: *python-setup
  script:
    - pytest tests/ -v -m "integration"

# 6. Coverage
coverage:report:
  stage: coverage
  <<: *python-setup
  script:
    - pytest tests/ --cov=utils --cov-report=term-missing
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    expire_in: 1 week

# 7. Audit Dependencies
audit:dependencies:
  stage: audit-deps
  <<: *python-setup
  script:
    - pip-audit -r requirements.txt --ignore-vuln PYSEC-2022-42969
  allow_failure: true

# 8. Audit Secrets
audit:secrets:
  stage: audit-secrets
  script:
    - apt-get update -qq && apt-get install -y -qq git python3-pip
    - pip3 install detect-secrets --break-system-packages
    - detect-secrets scan --baseline .secrets.baseline || true
    - detect-secrets audit .secrets.baseline
  allow_failure: true

# 9. Offline Check
offline:verify:
  stage: offline-check
  script:
    - echo "Verifying no outbound network calls in source"
    - '! grep -rnE "requests\.get|urllib\.request|httpx|aiohttp" utils/ app.py | grep -v "localhost\|127.0.0.1"'
    - echo "PASS: No outbound internet calls found"

# 10. Package & Build
build:package:
  stage: package
  <<: *python-setup
  script:
    - python -m py_compile app.py utils/*.py
    - echo "Build successful"
  artifacts:
    paths: [db/schema.sql, schemas/]
    expire_in: 1 week
